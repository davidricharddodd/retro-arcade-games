<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 - Retro Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a0033 0%, #000033 100%);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
            to { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff; }
        }
        
        #gameCanvas {
            border: 4px solid #00ffff;
            box-shadow: 0 0 30px #00ffff, inset 0 0 30px rgba(0, 255, 255, 0.1);
            background: #000;
            cursor: pointer;
            margin: 20px 0;
        }
        
        .controls {
            margin: 20px 0;
        }
        
        button {
            background: linear-gradient(135deg, #ff00ff 0%, #00ffff 100%);
            border: 3px solid #fff;
            color: #fff;
            padding: 15px 30px;
            font-size: 1.2em;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin: 10px;
            text-shadow: 2px 2px 4px #000;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }
        
        .status {
            font-size: 1.5em;
            margin: 10px 0;
            min-height: 40px;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .mode-selector {
            margin: 20px 0;
        }
        
        .mode-btn {
            padding: 10px 20px;
            font-size: 1em;
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, #00ff00 0%, #00ffff 100%);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔴 CONNECT 4 🟡</h1>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="pvpBtn">Player vs Player</button>
            <button class="mode-btn" id="aiBtn">Player vs AI</button>
        </div>
        
        <div class="status" id="status">Red's Turn</div>
        
        <canvas id="gameCanvas" width="700" height="600"></canvas>
        
        <div class="controls">
            <button id="resetBtn">New Game</button>
            <button id="backBtn">Back to Menu</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const backBtn = document.getElementById('backBtn');
        const pvpBtn = document.getElementById('pvpBtn');
        const aiBtn = document.getElementById('aiBtn');
        
        const ROWS = 6;
        const COLS = 7;
        const CELL_SIZE = 90;
        const PADDING = 20;
        const DISC_RADIUS = 35;
        
        let board = [];
        let currentPlayer = 1;
        let gameOver = false;
        let aiMode = false;
        let animatingDisc = null;
        
        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = 0;
                }
            }
            currentPlayer = 1;
            gameOver = false;
            animatingDisc = null;
            updateStatus();
        }
        
        function drawBoard() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            for (let c = 0; c <= COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(PADDING + c * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + c * CELL_SIZE, PADDING + ROWS * CELL_SIZE);
                ctx.stroke();
            }
            for (let r = 0; r <= ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(PADDING, PADDING + r * CELL_SIZE);
                ctx.lineTo(PADDING + COLS * CELL_SIZE, PADDING + r * CELL_SIZE);
                ctx.stroke();
            }
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const x = PADDING + c * CELL_SIZE + CELL_SIZE / 2;
                    const y = PADDING + r * CELL_SIZE + CELL_SIZE / 2;
                    
                    if (board[r][c] === 1) {
                        drawDisc(x, y, '#ff0000', '#ff6666');
                    } else if (board[r][c] === 2) {
                        drawDisc(x, y, '#ffff00', '#ffff99');
                    } else {
                        ctx.fillStyle = '#1a1a1a';
                        ctx.beginPath();
                        ctx.arc(x, y, DISC_RADIUS, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            if (animatingDisc) {
                const x = PADDING + animatingDisc.col * CELL_SIZE + CELL_SIZE / 2;
                const color = animatingDisc.player === 1 ? '#ff0000' : '#ffff00';
                const highlight = animatingDisc.player === 1 ? '#ff6666' : '#ffff99';
                drawDisc(x, animatingDisc.y, color, highlight);
            }
        }
        
        function drawDisc(x, y, color, highlight) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.beginPath();
            ctx.arc(x + 3, y + 3, DISC_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            
            const gradient = ctx.createRadialGradient(x - 10, y - 10, 5, x, y, DISC_RADIUS);
            gradient.addColorStop(0, highlight);
            gradient.addColorStop(1, color);
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, DISC_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(x - 12, y - 12, 12, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function getColumn(mouseX) {
            const x = mouseX - canvas.getBoundingClientRect().left;
            const col = Math.floor((x - PADDING) / CELL_SIZE);
            return col >= 0 && col < COLS ? col : -1;
        }
        
        function dropDisc(col) {
            if (gameOver || animatingDisc) return;
            
            let row = -1;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r][col] === 0) {
                    row = r;
                    break;
                }
            }
            
            if (row === -1) return;
            
            animatingDisc = {
                col: col,
                row: row,
                y: PADDING,
                targetY: PADDING + row * CELL_SIZE + CELL_SIZE / 2,
                player: currentPlayer,
                velocity: 0
            };
            
            animateDrop();
        }
        
        function animateDrop() {
            if (!animatingDisc) return;
            
            const gravity = 0.8;
            const bounce = 0.5;
            
            animatingDisc.velocity += gravity;
            animatingDisc.y += animatingDisc.velocity;
            
            if (animatingDisc.y >= animatingDisc.targetY) {
                animatingDisc.y = animatingDisc.targetY;
                
                if (Math.abs(animatingDisc.velocity) > 1) {
                    animatingDisc.velocity = -animatingDisc.velocity * bounce;
                } else {
                    board[animatingDisc.row][animatingDisc.col] = animatingDisc.player;
                    const winner = checkWin(animatingDisc.row, animatingDisc.col);
                    animatingDisc = null;
                    
                    if (winner) {
                        gameOver = true;
                        statusEl.textContent = winner === 1 ? '🎉 Red Wins! 🎉' : '🎉 Yellow Wins! 🎉';
                        statusEl.style.animation = 'glow 0.5s ease-in-out infinite alternate';
                    } else if (isBoardFull()) {
                        gameOver = true;
                        statusEl.textContent = "It's a Draw!";
                    } else {
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        updateStatus();
                        
                        if (aiMode && currentPlayer === 2 && !gameOver) {
                            setTimeout(makeAIMove, 500);
                        }
                    }
                    return;
                }
            }
            
            drawBoard();
            requestAnimationFrame(animateDrop);
        }
        
        function makeAIMove() {
            if (gameOver || animatingDisc) return;
            
            let bestCol = -1;
            
            for (let c = 0; c < COLS; c++) {
                const r = getLowestEmptyRow(c);
                if (r !== -1) {
                    board[r][c] = 2;
                    if (checkWin(r, c)) {
                        bestCol = c;
                        board[r][c] = 0;
                        break;
                    }
                    board[r][c] = 0;
                }
            }
            
            if (bestCol === -1) {
                for (let c = 0; c < COLS; c++) {
                    const r = getLowestEmptyRow(c);
                    if (r !== -1) {
                        board[r][c] = 1;
                        if (checkWin(r, c)) {
                            bestCol = c;
                            board[r][c] = 0;
                            break;
                        }
                        board[r][c] = 0;
                    }
                }
            }
            
            if (bestCol === -1) {
                const availableCols = [];
                for (let c = 0; c < COLS; c++) {
                    if (board[0][c] === 0) availableCols.push(c);
                }
                if (availableCols.length > 0) {
                    bestCol = availableCols[Math.floor(Math.random() * availableCols.length)];
                }
            }
            
            if (bestCol !== -1) {
                dropDisc(bestCol);
            }
        }
        
        function getLowestEmptyRow(col) {
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r][col] === 0) return r;
            }
            return -1;
        }
        
        function checkWin(row, col) {
            const player = board[row][col];
            if (player === 0) return false;
            
            let count = 1;
            for (let c = col - 1; c >= 0 && board[row][c] === player; c--) count++;
            for (let c = col + 1; c < COLS && board[row][c] === player; c++) count++;
            if (count >= 4) return player;
            
            count = 1;
            for (let r = row - 1; r >= 0 && board[r][col] === player; r--) count++;
            for (let r = row + 1; r < ROWS && board[r][col] === player; r++) count++;
            if (count >= 4) return player;
            
            count = 1;
            for (let i = 1; row - i >= 0 && col - i >= 0 && board[row - i][col - i] === player; i++) count++;
            for (let i = 1; row + i < ROWS && col + i < COLS && board[row + i][col + i] === player; i++) count++;
            if (count >= 4) return player;
            
            count = 1;
            for (let i = 1; row - i >= 0 && col + i < COLS && board[row - i][col + i] === player; i++) count++;
            for (let i = 1; row + i < ROWS && col - i >= 0 && board[row + i][col - i] === player; i++) count++;
            if (count >= 4) return player;
            
            return false;
        }
        
        function isBoardFull() {
            for (let c = 0; c < COLS; c++) {
                if (board[0][c] === 0) return false;
            }
            return true;
        }
        
        function updateStatus() {
            if (!gameOver) {
                statusEl.style.animation = 'none';
                if (aiMode && currentPlayer === 2) {
                    statusEl.textContent = "AI is thinking...";
                } else {
                    statusEl.textContent = currentPlayer === 1 ? "🔴 Red's Turn" : "🟡 Yellow's Turn";
                }
            }
        }
        
        canvas.addEventListener('click', (e) => {
            if (!gameOver && !animatingDisc && (!aiMode || currentPlayer === 1)) {
                const col = getColumn(e.clientX);
                if (col !== -1) {
                    dropDisc(col);
                }
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!gameOver && !animatingDisc && (!aiMode || currentPlayer === 1)) {
                const col = getColumn(e.clientX);
                canvas.style.opacity = col !== -1 ? '1' : '0.8';
            }
        });
        
        resetBtn.addEventListener('click', () => {
            initBoard();
            drawBoard();
        });
        
        backBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        pvpBtn.addEventListener('click', () => {
            aiMode = false;
            pvpBtn.classList.add('active');
            aiBtn.classList.remove('active');
            initBoard();
            drawBoard();
        });
        
        aiBtn.addEventListener('click', () => {
            aiMode = true;
            aiBtn.classList.add('active');
            pvpBtn.classList.remove('active');
            initBoard();
            drawBoard();
        });
        
        initBoard();
        drawBoard();
        
        function gameLoop() {
            if (!animatingDisc) {
                drawBoard();
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
