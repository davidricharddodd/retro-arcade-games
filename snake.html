<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Retro Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            color: #0f0;
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px #0f0;
        }
        
        .info {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        
        .score {
            color: #0f0;
            font-weight: bold;
        }
        
        canvas {
            border: 3px solid #0f0;
            box-shadow: 0 0 30px #0f0;
            background: #000;
            display: block;
            margin: 0 auto 1rem;
        }
        
        .controls {
            color: #fff;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        
        .btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #0d0;
            transform: scale(1.05);
            box-shadow: 0 0 20px #0f0;
        }
        
        .game-over {
            display: none;
            color: #f00;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px #f00;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 SNAKE</h1>
        <div class="info">
            Score: <span class="score" id="score">0</span> | 
            High Score: <span class="score" id="highScore">0</span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over" id="gameOver">GAME OVER!</div>
        <div class="controls">Use Arrow Keys to Move</div>
        <button class="btn" onclick="restartGame()">New Game</button>
        <button class="btn" onclick="location.href='index.html'">Back to Menu</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{x: 10, y: 10}];
        let dx = 0;
        let dy = 0;
        let foodX = 15;
        let foodY = 15;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gameSpeed = 100;
        
        highScoreElement.textContent = highScore;
        
        function drawGame() {
            if (!gameRunning) return;
            
            moveSnake();
            
            if (checkCollision()) {
                gameOver();
                return;
            }
            
            clearCanvas();
            drawFood();
            drawSnake();
            
            setTimeout(drawGame, gameSpeed);
        }
        
        function clearCanvas() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#0a0a0a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }
        
        function drawSnake() {
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = '#0f0';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#0f0';
                } else {
                    // Body
                    ctx.fillStyle = '#0d0';
                    ctx.shadowBlur = 10;
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                ctx.shadowBlur = 0;
            });
        }
        
        function drawFood() {
            ctx.fillStyle = '#f00';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#f00';
            ctx.beginPath();
            ctx.arc(
                foodX * gridSize + gridSize / 2,
                foodY * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function moveSnake() {
            if (dx === 0 && dy === 0) return;
            
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            
            if (head.x === foodX && head.y === foodY) {
                score++;
                scoreElement.textContent = score;
                
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                
                placeFood();
                
                // Speed up slightly
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                }
            } else {
                snake.pop();
            }
        }
        
        function placeFood() {
            do {
                foodX = Math.floor(Math.random() * tileCount);
                foodY = Math.floor(Math.random() * tileCount);
            } while (snake.some(segment => segment.x === foodX && segment.y === foodY));
        }
        
        function checkCollision() {
            const head = snake[0];
            
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }
            
            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }
        
        function gameOver() {
            gameRunning = false;
            gameOverElement.style.display = 'block';
        }
        
        function restartGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            gameSpeed = 100;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            placeFood();
            gameRunning = true;
            drawGame();
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameRunning && (e.key.startsWith('Arrow'))) {
                restartGame();
            }
            
            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) {
                        dx = 0;
                        dy = -1;
                    }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (dy === 0) {
                        dx = 0;
                        dy = 1;
                    }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (dx === 0) {
                        dx = -1;
                        dy = 0;
                    }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (dx === 0) {
                        dx = 1;
                        dy = 0;
                    }
                    e.preventDefault();
                    break;
            }
        });
        
        // Initial draw
        clearCanvas();
        drawFood();
        drawSnake();
    </script>
</body>
</html>
