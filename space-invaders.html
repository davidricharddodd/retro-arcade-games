<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Retro Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #000000 0%, #1a0033 100%);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
        }
        .game-container { text-align: center; }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00; }
            to { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff; }
        }
        #gameCanvas {
            border: 4px solid #00ff00;
            box-shadow: 0 0 30px #00ff00, inset 0 0 30px rgba(0, 255, 0, 0.1);
            background: #000;
            margin: 20px 0;
        }
        .score-board {
            font-size: 1.8em;
            margin: 10px 0;
            display: flex;
            justify-content: space-around;
            max-width: 800px;
        }
        .score-item { text-shadow: 0 0 10px #00ff00; }
        .controls { margin: 20px 0; }
        button {
            background: linear-gradient(135deg, #00ff00 0%, #00ffff 100%);
            border: 3px solid #fff;
            color: #000;
            font-weight: bold;
            padding: 15px 30px;
            font-size: 1.2em;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }
        .instructions { font-size: 1em; margin: 10px 0; color: #00ff00; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>👾 SPACE INVADERS 👾</h1>
        <div class="score-board">
            <div class="score-item">Score: <span id="score">0</span></div>
            <div class="score-item">Lives: <span id="lives">🚀🚀🚀</span></div>
            <div class="score-item">Level: <span id="level">1</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="instructions">Use Arrow Keys to Move • SPACE to Shoot</div>
        <div class="controls">
            <button id="resetBtn">New Game</button>
            <button id="backBtn">Back to Menu</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');
        const resetBtn = document.getElementById('resetBtn');
        const backBtn = document.getElementById('backBtn');
        let score = 0, lives = 3, level = 1, gameOver = false;
        let player = { x: canvas.width / 2 - 25, y: canvas.height - 60, width: 50, height: 30, speed: 5 };
        let bullets = [], bulletSpeed = 7, canShoot = true, shootCooldown = 0;
        let aliens = [], alienRows = 5, alienCols = 11, alienWidth = 40, alienHeight = 30, alienSpeed = 1, alienDirection = 1, alienDropDistance = 20;
        let alienBullets = [], alienShootChance = 0.001;
        let shields = [], keys = {};
        function initGame() {
            score = 0; lives = 3; level = 1; gameOver = false;
            player = { x: canvas.width / 2 - 25, y: canvas.height - 60, width: 50, height: 30, speed: 5 };
            bullets = []; alienBullets = []; canShoot = true; shootCooldown = 0;
            createAliens(); createShields(); updateDisplay();
        }
        function createAliens() {
            aliens = []; alienSpeed = 1 + level * 0.3;
            const startX = 80, startY = 80, spacingX = 60, spacingY = 50;
            for (let row = 0; row < alienRows; row++) {
                for (let col = 0; col < alienCols; col++) {
                    let color, points;
                    if (row === 0) { color = '#ff00ff'; points = 30; }
                    else if (row < 3) { color = '#00ffff'; points = 20; }
                    else { color = '#00ff00'; points = 10; }
                    aliens.push({ x: startX + col * spacingX, y: startY + row * spacingY, width: alienWidth, height: alienHeight, color: color, points: points, alive: true, frame: 0 });
                }
            }
        }
        function createShields() {
            shields = [];
            const shieldY = canvas.height - 150, shieldSpacing = 180, shieldStartX = 100;
            for (let i = 0; i < 4; i++) {
                const shield = { x: shieldStartX + i * shieldSpacing, y: shieldY, width: 80, height: 60, blocks: [] };
                const blockSize = 10;
                for (let y = 0; y < 6; y++) {
                    for (let x = 0; x < 8; x++) {
                        if ((y < 4) || (y === 4 && x > 1 && x < 6) || (y === 5 && x > 2 && x < 5)) {
                            shield.blocks.push({ x: shield.x + x * blockSize, y: shield.y + y * blockSize, size: blockSize, alive: true });
                        }
                    }
                }
                shields.push(shield);
            }
        }
        function updateDisplay() {
            scoreEl.textContent = score;
            livesEl.textContent = '🚀'.repeat(lives);
            levelEl.textContent = level;
        }
        function drawPlayer() {
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#00ffff';
            ctx.fillRect(player.x + player.width / 2 - 5, player.y + 10, 10, 10);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(player.x - 10, player.y + player.height - 10, 10, 10);
            ctx.fillRect(player.x + player.width, player.y + player.height - 10, 10, 10);
        }
        function drawAliens() {
            for (let alien of aliens) {
                if (!alien.alive) continue;
                alien.frame += 0.1;
                const frame = Math.floor(alien.frame) % 2;
                ctx.fillStyle = alien.color;
                ctx.strokeStyle = alien.color;
                ctx.lineWidth = 2;
                if (frame === 0) {
                    ctx.beginPath();
                    ctx.moveTo(alien.x + 10, alien.y + 5);
                    ctx.lineTo(alien.x + 15, alien.y);
                    ctx.lineTo(alien.x + 25, alien.y);
                    ctx.lineTo(alien.x + 30, alien.y + 5);
                    ctx.lineTo(alien.x + 35, alien.y + 10);
                    ctx.lineTo(alien.x + 35, alien.y + 20);
                    ctx.lineTo(alien.x + 30, alien.y + 25);
                    ctx.lineTo(alien.x + 25, alien.y + 30);
                    ctx.lineTo(alien.x + 15, alien.y + 30);
                    ctx.lineTo(alien.x + 10, alien.y + 25);
                    ctx.lineTo(alien.x + 5, alien.y + 20);
                    ctx.lineTo(alien.x + 5, alien.y + 10);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.fillRect(alien.x + 12, alien.y + 12, 6, 6);
                    ctx.fillRect(alien.x + 22, alien.y + 12, 6, 6);
                    ctx.strokeStyle = alien.color;
                    ctx.beginPath();
                    ctx.moveTo(alien.x + 10, alien.y + 30);
                    ctx.lineTo(alien.x + 5, alien.y + 35);
                    ctx.moveTo(alien.x + 20, alien.y + 30);
                    ctx.lineTo(alien.x + 20, alien.y + 35);
                    ctx.moveTo(alien.x + 30, alien.y + 30);
                    ctx.lineTo(alien.x + 35, alien.y + 35);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(alien.x + 10, alien.y + 5);
                    ctx.lineTo(alien.x + 15, alien.y);
                    ctx.lineTo(alien.x + 25, alien.y);
                    ctx.lineTo(alien.x + 30, alien.y + 5);
                    ctx.lineTo(alien.x + 35, alien.y + 10);
                    ctx.lineTo(alien.x + 35, alien.y + 20);
                    ctx.lineTo(alien.x + 30, alien.y + 25);
                    ctx.lineTo(alien.x + 25, alien.y + 30);
                    ctx.lineTo(alien.x + 15, alien.y + 30);
                    ctx.lineTo(alien.x + 10, alien.y + 25);
                    ctx.lineTo(alien.x + 5, alien.y + 20);
                    ctx.lineTo(alien.x + 5, alien.y + 10);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.fillRect(alien.x + 12, alien.y + 12, 6, 6);
                    ctx.fillRect(alien.x + 22, alien.y + 12, 6, 6);
                    ctx.strokeStyle = alien.color;
                    ctx.beginPath();
                    ctx.moveTo(alien.x + 10, alien.y + 30);
                    ctx.lineTo(alien.x + 8, alien.y + 35);
                    ctx.moveTo(alien.x + 20, alien.y + 30);
                    ctx.lineTo(alien.x + 20, alien.y + 35);
                    ctx.moveTo(alien.x + 30, alien.y + 30);
                    ctx.lineTo(alien.x + 32, alien.y + 35);
                    ctx.stroke();
                }
            }
        }
        function drawBullets() {
            ctx.fillStyle = '#ffff00';
            for (let bullet of bullets) ctx.fillRect(bullet.x, bullet.y, 3, 15);
            ctx.fillStyle = '#ff0000';
            for (let bullet of alienBullets) ctx.fillRect(bullet.x, bullet.y, 3, 15);
        }
        function drawShields() {
            for (let shield of shields) {
                ctx.fillStyle = '#00ff00';
                for (let block of shield.blocks) {
                    if (block.alive) ctx.fillRect(block.x, block.y, block.size, block.size);
                }
            }
        }
        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;
            if (shootCooldown > 0) shootCooldown--;
            else canShoot = true;
            if (keys[' '] && canShoot) {
                bullets.push({ x: player.x + player.width / 2 - 1.5, y: player.y, width: 3, height: 15 });
                canShoot = false;
                shootCooldown = 30;
            }
        }
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bulletSpeed;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }
            for (let i = alienBullets.length - 1; i >= 0; i--) {
                alienBullets[i].y += bulletSpeed * 0.7;
                if (alienBullets[i].y > canvas.height) alienBullets.splice(i, 1);
            }
        }
        function updateAliens() {
            let hitEdge = false;
            for (let alien of aliens) {
                if (!alien.alive) continue;
                alien.x += alienSpeed * alienDirection;
                if (alien.x <= 0 || alien.x + alien.width >= canvas.width) hitEdge = true;
                if (Math.random() < alienShootChance * level) {
                    alienBullets.push({ x: alien.x + alien.width / 2, y: alien.y + alien.height, width: 3, height: 15 });
                }
                if (alien.y + alien.height >= player.y) gameOver = true;
            }
            if (hitEdge) {
                alienDirection *= -1;
                for (let alien of aliens) {
                    if (alien.alive) alien.y += alienDropDistance;
                }
            }
        }
        function checkCollisions() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                let bulletHit = false;
                for (let alien of aliens) {
                    if (!alien.alive) continue;
                    if (bullets[i].x >= alien.x && bullets[i].x <= alien.x + alien.width &&
                        bullets[i].y >= alien.y && bullets[i].y <= alien.y + alien.height) {
                        alien.alive = false;
                        score += alien.points;
                        bullets.splice(i, 1);
                        bulletHit = true;
                        updateDisplay();
                        break;
                    }
                }
                if (bulletHit) continue;
                for (let shield of shields) {
                    for (let block of shield.blocks) {
                        if (!block.alive) continue;
                        if (bullets[i] && bullets[i].x >= block.x && bullets[i].x <= block.x + block.size &&
                            bullets[i].y >= block.y && bullets[i].y <= block.y + block.size) {
                            block.alive = false;
                            bullets.splice(i, 1);
                            break;
                        }
                    }
                }
            }
            for (let i = alienBullets.length - 1; i >= 0; i--) {
                if (alienBullets[i].x >= player.x && alienBullets[i].x <= player.x + player.width &&
                    alienBullets[i].y >= player.y && alienBullets[i].y <= player.y + player.height) {
                    lives--;
                    alienBullets.splice(i, 1);
                    updateDisplay();
                    if (lives <= 0) gameOver = true;
                    continue;
                }
                for (let shield of shields) {
                    for (let block of shield.blocks) {
                        if (!block.alive) continue;
                        if (alienBullets[i] && alienBullets[i].x >= block.x && alienBullets[i].x <= block.x + block.size &&
                            alienBullets[i].y >= block.y && alienBullets[i].y <= block.y + block.size) {
                            block.alive = false;
                            alienBullets.splice(i, 1);
                            break;
                        }
                    }
                }
            }
            let allDead = true;
            for (let alien of aliens) {
                if (alien.alive) { allDead = false; break; }
            }
            if (allDead) { level++; updateDisplay(); createAliens(); }
        }
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 100; i++) {
                const x = (i * 137) % canvas.width;
                const y = (i * 211) % canvas.height;
                ctx.fillRect(x, y, 1, 1);
            }
            drawShields(); drawPlayer(); drawAliens(); drawBullets();
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 64px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
                ctx.font = '32px Courier New';
                ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 60);
                ctx.fillText('Level Reached: ' + level, canvas.width / 2, canvas.height / 2 + 100);
            }
        }
        function gameLoop() {
            if (!gameOver) {
                updatePlayer(); updateBullets(); updateAliens(); checkCollisions();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });
        resetBtn.addEventListener('click', initGame);
        backBtn.addEventListener('click', () => { window.location.href = 'index.html'; });
        initGame();
        gameLoop();
    </script>
</body>
</html>
