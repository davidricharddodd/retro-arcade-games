<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#000"/>
  
  <!-- Retro arcade machine shape -->
  <rect x="20" y="15" width="60" height="70" fill="#1a1a1a" stroke="#0ff" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="25" y="20" width="50" height="35" fill="#000" stroke="#0ff" stroke-width="1"/>
  
  <!-- Pac-Man on screen -->
  <circle cx="40" cy="37" r="8" fill="#ff0"/>
  <path d="M 40 37 L 46 34 L 46 40 Z" fill="#000"/>
  
  <!-- Ghost on screen -->
  <path d="M 60 29 Q 60 26 63 26 Q 66 26 66 29 L 66 42 L 64 40 L 62 42 L 60 40 Z" fill="#f0f"/>
  <circle cx="62" cy="31" r="1.5" fill="#fff"/>
  <circle cx="64" cy="31" r="1.5" fill="#fff"/>
  
  <!-- Control panel -->
  <rect x="25" y="60" width="50" height="20" fill="#333"/>
  
  <!-- Buttons -->
  <circle cx="35" cy="70" r="4" fill="#f00"/>
  <circle cx="45" cy="70" r="4" fill="#0f0"/>
  <circle cx="55" cy="70" r="4" fill="#00f"/>
  <circle cx="65" cy="70" r="4" fill="#ff0"/>
  
  <!-- Joystick -->
  <circle cx="35" cy="70" r="2" fill="#fff" opacity="0.3"/>
  
  <!-- Pixels/Stars decoration -->
  <rect x="30" y="25" width="1" height="1" fill="#0ff"/>
  <rect x="68" y="30" width="1" height="1" fill="#0ff"/>
  <rect x="50" y="48" width="1" height="1" fill="#0ff"/>
</svg>