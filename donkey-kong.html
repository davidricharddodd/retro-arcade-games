<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkey Kong - Retro Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #fff; }
        .game-container { text-align: center; }
        h1 { color: #ff6600; font-size: 2.5rem; margin-bottom: 0.5rem; text-shadow: 0 0 20px #ff6600; }
        .game-info { display: flex; justify-content: space-around; max-width: 640px; margin: 0 auto 0.5rem; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 2px solid #ff6600; }
        .info-item { font-size: 1.1rem; }
        .info-label { color: #ff6600; font-weight: bold; }
        canvas { border: 3px solid #ff6600; box-shadow: 0 0 30px #ff6600; background: #000; display: block; margin: 0 auto 0.5rem; }
        .controls { color: #fff; margin: 0.5rem 0; font-size: 0.85rem; }
        .btn { background: linear-gradient(135deg, #ff6600, #cc3300); color: #fff; border: none; padding: 10px 25px; font-size: 1rem; font-family: 'Courier New', monospace; cursor: pointer; margin: 5px; border-radius: 5px; font-weight: bold; }
        .btn:hover { transform: scale(1.05); }
        .overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0055; font-size: 2rem; font-weight: bold; text-shadow: 0 0 20px #ff0055; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🦍 DONKEY KONG 🦍</h1>
        <div class="game-info">
            <div class="info-item"><span class="info-label">SCORE:</span> <span id="score">0</span></div>
            <div class="info-item"><span class="info-label">LIVES:</span> <span id="lives">❤️❤️❤️</span></div>
            <div class="info-item"><span class="info-label">LEVEL:</span> <span id="level">1</span></div>
        </div>
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        <div class="controls">← → Move | SPACE Jump | ↑↓ Climb Ladders (when touching)</div>
        <button class="btn" onclick="restartGame()">New Game</button>
        <button class="btn" onclick="location.href='index.html'">Back to Menu</button>
    </div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 480;

// Proper physics
const GRAVITY = 0.6;
const JUMP_POWER = 12;
const MOVE_SPEED = 4;
const CLIMB_SPEED = 3;
const MAX_FALL = 12;

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type='square', vol=0.08) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}
function jumpSound() { beep(250, 0.1); beep(350, 0.1); }
function hitSound() { beep(100, 0.3); beep(80, 0.4); }
function winSound() { [400, 500, 600, 800].forEach((f, i) => setTimeout(() => beep(f, 0.15, 'triangle'), i * 100)); }
function pickupSound() { beep(600, 0.1); beep(800, 0.1); }

// Game state
let score = 0, lives = 3, level = 1;
let gameState = 'title'; // title, playing, dead, levelComplete, gameOver
let mario, dk, pauline;
let platforms = [], ladders = [], barrels = [], particles = [];
let keys = {};
let barrelTimer = 0;
let deathTimer = 0;
let levelTimer = 0;

// Level data - platforms are solid rectangles Mario walks ON TOP of
const LEVELS = [
    { // Level 1 - Classic
        platforms: [
            { x: 0, y: 460, w: 640, h: 20 }, // Ground
            { x: 0, y: 380, w: 580, h: 15, slant: 0.02 },
            { x: 60, y: 300, w: 580, h: 15, slant: -0.02 },
            { x: 0, y: 220, w: 580, h: 15, slant: 0.02 },
            { x: 60, y: 140, w: 500, h: 15, slant: -0.02 },
            { x: 150, y: 70, w: 340, h: 15 }
        ],
        ladders: [
            { x: 550, y: 380, h: 80 },
            { x: 80, y: 300, h: 80 },
            { x: 500, y: 220, h: 80 },
            { x: 120, y: 140, h: 80 },
            { x: 400, y: 70, h: 70 }
        ],
        marioStart: { x: 50, y: 440 },
        dkPos: { x: 80, y: 20 },
        paulinePos: { x: 300, y: 40 }
    },
    { // Level 2
        platforms: [
            { x: 0, y: 460, w: 640, h: 20 },
            { x: 50, y: 380, w: 250, h: 15 },
            { x: 340, y: 380, w: 250, h: 15 },
            { x: 100, y: 300, w: 440, h: 15 },
            { x: 0, y: 220, w: 280, h: 15 },
            { x: 360, y: 220, w: 280, h: 15 },
            { x: 150, y: 140, w: 340, h: 15 },
            { x: 200, y: 70, w: 240, h: 15 }
        ],
        ladders: [
            { x: 270, y: 380, h: 80 },
            { x: 370, y: 380, h: 80 },
            { x: 300, y: 300, h: 80 },
            { x: 180, y: 220, h: 80 },
            { x: 460, y: 220, h: 80 },
            { x: 320, y: 140, h: 70 }
        ],
        marioStart: { x: 50, y: 440 },
        dkPos: { x: 100, y: 20 },
        paulinePos: { x: 300, y: 40 }
    }
];

function initLevel() {
    const L = LEVELS[(level - 1) % LEVELS.length];
    platforms = L.platforms.map(p => ({ ...p }));
    ladders = L.ladders.map(l => ({ ...l, w: 28 }));
    
    mario = {
        x: L.marioStart.x,
        y: L.marioStart.y,
        w: 20,
        h: 28,
        vx: 0,
        vy: 0,
        onGround: false,
        onLadder: false,
        climbing: false,
        facing: 1,
        frame: 0,
        hammer: false,
        hammerTime: 0,
        invincible: false,
        invTime: 0
    };
    
    dk = { x: L.dkPos.x, y: L.dkPos.y, w: 50, h: 45, frame: 0, throwAnim: 0 };
    pauline = { x: L.paulinePos.x, y: L.paulinePos.y, w: 16, h: 24 };
    
    barrels = [];
    particles = [];
    barrelTimer = 120;
}

function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    let h = '';
    for (let i = 0; i < lives; i++) h += '❤️';
    document.getElementById('lives').textContent = h || '💀';
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            color,
            life: 30 + Math.random() * 20,
            size: 2 + Math.random() * 3
        });
    }
}

// Check if point is on a ladder
function onLadder(x, y, h) {
    for (const l of ladders) {
        if (x + 10 > l.x && x + 10 < l.x + l.w && y + h > l.y && y < l.y + l.h) {
            return l;
        }
    }
    return null;
}

// Get platform Y at position X (for slanted platforms)
function getPlatY(p, x) {
    if (!p.slant) return p.y;
    return p.y + (x - p.x) * p.slant;
}

// Check if mario is standing on a platform
function checkPlatformCollision() {
    mario.onGround = false;
    
    for (const p of platforms) {
        const platY = getPlatY(p, mario.x + mario.w / 2);
        
        // Check if mario's feet are at platform level
        if (mario.x + mario.w > p.x && mario.x < p.x + p.w) {
            // Landing on platform from above
            if (mario.vy >= 0 && 
                mario.y + mario.h >= platY && 
                mario.y + mario.h <= platY + 15 + mario.vy) {
                mario.y = platY - mario.h;
                mario.vy = 0;
                mario.onGround = true;
                return;
            }
        }
    }
}

function update() {
    if (gameState !== 'playing') return;
    
    mario.frame++;
    
    // Check ladder overlap
    const ladder = onLadder(mario.x, mario.y, mario.h);
    mario.onLadder = !!ladder;
    
    // Climbing
    if (mario.climbing && ladder) {
        mario.vx = 0;
        mario.vy = 0;
        
        if (keys['ArrowUp']) {
            mario.y -= CLIMB_SPEED;
            // Check if reached top of ladder
            if (mario.y + mario.h < ladder.y) {
                mario.climbing = false;
                mario.y = ladder.y - mario.h - 5;
            }
        }
        if (keys['ArrowDown']) {
            mario.y += CLIMB_SPEED;
            // Check if reached bottom
            if (mario.y > ladder.y + ladder.h - 10) {
                mario.climbing = false;
            }
        }
        
        // Exit ladder with left/right
        if (keys['ArrowLeft'] || keys['ArrowRight']) {
            mario.climbing = false;
        }
    } else {
        mario.climbing = false;
        
        // Horizontal movement
        if (keys['ArrowLeft']) {
            mario.vx = -MOVE_SPEED;
            mario.facing = -1;
        } else if (keys['ArrowRight']) {
            mario.vx = MOVE_SPEED;
            mario.facing = 1;
        } else {
            mario.vx = 0;
        }
        
        // Start climbing
        if (mario.onLadder && (keys['ArrowUp'] || keys['ArrowDown'])) {
            mario.climbing = true;
            mario.x = ladder.x + ladder.w / 2 - mario.w / 2;
            mario.vy = 0;
        }
        
        // Jump - ONLY when on ground
        if (keys[' '] && mario.onGround && !mario.climbing) {
            mario.vy = -JUMP_POWER;
            mario.onGround = false;
            jumpSound();
        }
        
        // Apply gravity
        if (!mario.climbing) {
            mario.vy += GRAVITY;
            if (mario.vy > MAX_FALL) mario.vy = MAX_FALL;
        }
        
        // Move
        mario.x += mario.vx;
        mario.y += mario.vy;
        
        // Platform collision
        checkPlatformCollision();
    }
    
    // Screen bounds
    if (mario.x < 0) mario.x = 0;
    if (mario.x + mario.w > W) mario.x = W - mario.w;
    
    // Fell off screen
    if (mario.y > H + 50) {
        killMario();
        return;
    }
    
    // Invincibility timer
    if (mario.invincible) {
        mario.invTime--;
        if (mario.invTime <= 0) mario.invincible = false;
    }
    
    // Hammer timer
    if (mario.hammer) {
        mario.hammerTime--;
        if (mario.hammerTime <= 0) mario.hammer = false;
    }
    
    // DK throws barrels
    barrelTimer--;
    if (barrelTimer <= 0) {
        const speed = 2 + level * 0.5;
        barrels.push({
            x: dk.x + dk.w,
            y: dk.y + dk.h - 15,
            w: 16, h: 16,
            vx: speed,
            vy: 0,
            onGround: false,
            rotation: 0,
            jumped: false
        });
        barrelTimer = Math.max(60, 150 - level * 20);
        dk.throwAnim = 15;
    }
    if (dk.throwAnim > 0) dk.throwAnim--;
    
    // Update barrels
    for (let i = barrels.length - 1; i >= 0; i--) {
        const b = barrels[i];
        
        // Apply gravity
        b.vy += GRAVITY * 0.7;
        if (b.vy > 8) b.vy = 8;
        
        b.x += b.vx;
        b.y += b.vy;
        b.rotation += b.vx * 0.15;
        
        // Platform collision for barrel
        b.onGround = false;
        for (const p of platforms) {
            const platY = getPlatY(p, b.x + b.w / 2);
            if (b.x + b.w > p.x && b.x < p.x + p.w) {
                if (b.vy >= 0 && b.y + b.h >= platY && b.y + b.h <= platY + 20 + b.vy) {
                    b.y = platY - b.h;
                    b.vy = 0;
                    b.onGround = true;
                    
                    // Roll direction based on slant
                    const slant = p.slant || 0;
                    const speed = 2 + level * 0.5;
                    if (slant > 0) b.vx = speed;
                    else if (slant < 0) b.vx = -speed;
                }
            }
        }
        
        // Barrel falls down ladder randomly
        for (const l of ladders) {
            if (b.onGround && Math.abs(b.x + b.w/2 - (l.x + l.w/2)) < 12 && 
                Math.abs(b.y + b.h - l.y) < 10 && Math.random() < 0.4) {
                b.vy = 3;
                b.vx = 0;
                b.onGround = false;
                break;
            }
        }
        
        // Remove if off screen
        if (b.y > H + 50 || b.x < -50 || b.x > W + 50) {
            barrels.splice(i, 1);
            continue;
        }
        
        // Collision with Mario
        if (!mario.invincible) {
            const mx = mario.x, my = mario.y, mw = mario.w, mh = mario.h;
            if (mx + mw > b.x + 4 && mx < b.x + b.w - 4 &&
                my + mh > b.y + 4 && my < b.y + b.h - 4) {
                if (mario.hammer) {
                    // Smash barrel
                    barrels.splice(i, 1);
                    score += 300;
                    spawnParticles(b.x + b.w/2, b.y + b.h/2, '#884400', 10);
                    pickupSound();
                    updateHUD();
                } else {
                    killMario();
                    return;
                }
            }
        }
        
        // Jump over barrel bonus
        if (!b.jumped && mario.vy < 0 && !mario.hammer &&
            Math.abs(mario.x + mario.w/2 - (b.x + b.w/2)) < 35 &&
            mario.y + mario.h < b.y + 5 && mario.y + mario.h > b.y - 30) {
            b.jumped = true;
            score += 100;
            spawnParticles(mario.x + mario.w/2, mario.y + mario.h, '#ffff00', 5);
            updateHUD();
        }
    }
    
    // Reach Pauline
    if (mario.x + mario.w > pauline.x && mario.x < pauline.x + pauline.w &&
        mario.y + mario.h > pauline.y && mario.y < pauline.y + pauline.h + 20) {
        winLevel();
    }
    
    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function killMario() {
    if (mario.invincible) return;
    hitSound();
    lives--;
    spawnParticles(mario.x + mario.w/2, mario.y + mario.h/2, '#ff0055', 20);
    updateHUD();
    
    if (lives <= 0) {
        gameState = 'gameOver';
    } else {
        gameState = 'dead';
        deathTimer = 90;
    }
}

function winLevel() {
    winSound();
    score += 500;
    updateHUD();
    gameState = 'levelComplete';
    levelTimer = 120;
}

function draw() {
    // Clear
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    
    // Draw platforms (red girders)
    for (const p of platforms) {
        ctx.save();
        const y1 = getPlatY(p, p.x);
        const y2 = getPlatY(p, p.x + p.w);
        
        ctx.beginPath();
        ctx.moveTo(p.x, y1);
        ctx.lineTo(p.x + p.w, y2);
        ctx.lineTo(p.x + p.w, y2 + p.h);
        ctx.lineTo(p.x, y1 + p.h);
        ctx.closePath();
        ctx.fillStyle = '#cc2200';
        ctx.fill();
        
        // Girder pattern
        ctx.strokeStyle = '#ff4422';
        ctx.lineWidth = 1;
        for (let gx = p.x; gx < p.x + p.w; gx += 16) {
            const gy = getPlatY(p, gx);
            ctx.beginPath();
            ctx.moveTo(gx, gy + 2);
            ctx.lineTo(gx + 8, gy + p.h - 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(gx + 8, gy + 2);
            ctx.lineTo(gx, gy + p.h - 2);
            ctx.stroke();
        }
        ctx.restore();
    }
    
    // Draw ladders
    ctx.strokeStyle = '#00ddff';
    ctx.lineWidth = 2;
    for (const l of ladders) {
        // Side rails
        ctx.beginPath();
        ctx.moveTo(l.x, l.y);
        ctx.lineTo(l.x, l.y + l.h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(l.x + l.w, l.y);
        ctx.lineTo(l.x + l.w, l.y + l.h);
        ctx.stroke();
        // Rungs
        for (let ry = l.y + 8; ry < l.y + l.h; ry += 10) {
            ctx.beginPath();
            ctx.moveTo(l.x, ry);
            ctx.lineTo(l.x + l.w, ry);
            ctx.stroke();
        }
    }
    
    // Draw DK
    const dkX = dk.x, dkY = dk.y;
    // Body
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(dkX + 8, dkY + 12, 34, 28);
    // Belly
    ctx.fillStyle = '#D2691E';
    ctx.fillRect(dkX + 14, dkY + 18, 22, 16);
    // Head
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(dkX + 12, dkY, 26, 16);
    // Face
    ctx.fillStyle = '#D2691E';
    ctx.fillRect(dkX + 16, dkY + 4, 18, 10);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(dkX + 18, dkY + 5, 4, 4);
    ctx.fillRect(dkX + 28, dkY + 5, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(dkX + 19, dkY + 6, 2, 2);
    ctx.fillRect(dkX + 29, dkY + 6, 2, 2);
    // Arms
    ctx.fillStyle = '#8B4513';
    if (dk.throwAnim > 0) {
        ctx.fillRect(dkX + 40, dkY + 10, 14, 8);
    } else {
        ctx.fillRect(dkX + 40, dkY + 18, 12, 8);
    }
    ctx.fillRect(dkX - 4, dkY + 18, 12, 8);
    // Legs
    ctx.fillRect(dkX + 10, dkY + 38, 10, 8);
    ctx.fillRect(dkX + 30, dkY + 38, 10, 8);
    
    // Draw Pauline
    ctx.fillStyle = '#ff69b4';
    ctx.fillRect(pauline.x + 3, pauline.y + 8, 10, 14);
    ctx.fillStyle = '#ffcc99';
    ctx.fillRect(pauline.x + 4, pauline.y, 8, 8);
    ctx.fillStyle = '#ff1493';
    ctx.fillRect(pauline.x + 3, pauline.y + 1, 10, 3);
    // HELP text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px Courier';
    ctx.textAlign = 'center';
    const helpY = pauline.y - 6 + Math.sin(Date.now() / 250) * 2;
    ctx.fillText('HELP!', pauline.x + 8, helpY);
    ctx.textAlign = 'left';
    
    // Draw barrels
    for (const b of barrels) {
        ctx.save();
        ctx.translate(b.x + b.w/2, b.y + b.h/2);
        ctx.rotate(b.rotation);
        ctx.fillStyle = '#663300';
        ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
        ctx.fillStyle = '#996633';
        ctx.fillRect(-b.w/2 + 2, -b.h/2 + 2, b.w - 4, 3);
        ctx.fillRect(-b.w/2 + 2, b.h/2 - 5, b.w - 4, 3);
        ctx.restore();
    }
    
    // Draw Mario
    if (!mario.invincible || Math.floor(Date.now() / 60) % 2 === 0) {
        const mx = mario.x, my = mario.y, f = mario.facing;
        // Cap
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(mx + 3, my, 14, 5);
        ctx.fillRect(mx + (f > 0 ? 1 : 5), my - 2, 10, 4);
        // Face
        ctx.fillStyle = '#ffcc99';
        ctx.fillRect(mx + 4, my + 5, 12, 7);
        // Eye
        ctx.fillStyle = '#000';
        ctx.fillRect(mx + (f > 0 ? 11 : 6), my + 6, 2, 2);
        // Mustache
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(mx + 4, my + 10, 12, 2);
        // Shirt
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(mx + 3, my + 12, 14, 6);
        // Overalls
        ctx.fillStyle = '#0000cc';
        ctx.fillRect(mx + 5, my + 14, 10, 4);
        // Arms
        ctx.fillStyle = '#ffcc99';
        if (mario.climbing) {
            const armOffset = Math.sin(mario.frame * 0.3) * 3;
            ctx.fillRect(mx - 1, my + 12 + armOffset, 4, 5);
            ctx.fillRect(mx + 17, my + 12 - armOffset, 4, 5);
        } else if (mario.hammer) {
            ctx.save();
            ctx.translate(mx + 10, my + 8);
            ctx.rotate(Math.sin(mario.frame * 0.4) * 0.8);
            ctx.fillStyle = '#ffaa00';
            ctx.fillRect(-3, -16, 8, 10);
            ctx.fillStyle = '#666';
            ctx.fillRect(-1, -6, 4, 12);
            ctx.restore();
        } else {
            ctx.fillRect(mx - 1, my + 13, 4, 4);
            ctx.fillRect(mx + 17, my + 13, 4, 4);
        }
        // Legs
        ctx.fillStyle = '#0000cc';
        if (mario.climbing) {
            const legOffset = Math.sin(mario.frame * 0.25) * 2;
            ctx.fillRect(mx + 5, my + 18 + legOffset, 4, 8);
            ctx.fillRect(mx + 11, my + 18 - legOffset, 4, 8);
        } else if (Math.abs(mario.vx) > 0 && mario.onGround) {
            const legOffset = Math.sin(mario.frame * 0.35) * 2;
            ctx.fillRect(mx + 4, my + 18 + legOffset, 5, 8);
            ctx.fillRect(mx + 11, my + 18 - legOffset, 5, 8);
        } else {
            ctx.fillRect(mx + 5, my + 18, 4, 8);
            ctx.fillRect(mx + 11, my + 18, 4, 8);
        }
        // Shoes
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(mx + 3, my + 24, 6, 3);
        ctx.fillRect(mx + 11, my + 24, 6, 3);
    }
    
    // Draw particles
    for (const p of particles) {
        ctx.globalAlpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Overlays
    if (gameState === 'title') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ff6600';
        ctx.font = 'bold 32px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('DONKEY KONG', W/2, H/2 - 40);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Courier New';
        ctx.fillText('Press SPACE to Start!', W/2, H/2 + 10);
        ctx.font = '12px Courier New';
        ctx.fillText('← → Move | SPACE Jump | ↑↓ Climb', W/2, H/2 + 50);
        ctx.textAlign = 'left';
    }
    
    if (gameState === 'dead') {
        deathTimer--;
        ctx.fillStyle = 'rgba(255,0,50,0.3)';
        ctx.fillRect(0, 0, W, H);
        if (deathTimer <= 0) {
            gameState = 'playing';
            initLevel();
        }
    }
    
    if (gameState === 'levelComplete') {
        levelTimer--;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 28px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL ' + (level-1) + ' COMPLETE!', W/2, H/2 - 10);
        ctx.fillStyle = '#fff';
        ctx.font = '18px Courier New';
        ctx.fillText('+500 BONUS!', W/2, H/2 + 30);
        ctx.textAlign = 'left';
        if (levelTimer <= 0) {
            gameState = 'playing';
            initLevel();
        }
    }
    
    if (gameState === 'gameOver') {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ff0055';
        ctx.font = 'bold 36px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W/2, H/2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '18px Courier New';
        ctx.fillText('Final Score: ' + score, W/2, H/2 + 20);
        ctx.fillText('Press SPACE to Restart', W/2, H/2 + 60);
        ctx.textAlign = 'left';
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function restartGame() {
    score = 0;
    lives = 3;
    level = 1;
    gameState = 'playing';
    initLevel();
    updateHUD();
}

document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    if (e.key === ' ') {
        if (gameState === 'title' || gameState === 'gameOver') {
            restartGame();
        }
    }
});

document.addEventListener('keyup', e => {
    keys[e.key] = false;
});

// Start
initLevel();
updateHUD();
gameLoop();
</script>
</body>
</html>
